name: beautiful_todo_app
description: "A new Flutter project"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.0
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/todoLogo.png"
  min_sdk_android: 21

  web:
    generate: true
    image_path: "assets/todoLogo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

  windows:
    generate: true
    image_path: "assets/todoLogo.png"
    icon_size: 48

  macos:
    generate: true
    image_path: "assets/todoLogo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/todoLogo.png